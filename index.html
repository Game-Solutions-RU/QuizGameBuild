<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Memory</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script>
      // URL Parameter Bridging: платформы мини-приложений передают tracking token
      // через свои параметры (startapp, tgWebAppStartParam, WebAppStartParam, hash).
      // Unity читает _tk из URL — мост между платформами и Unity.
      // Выполняется СИНХРОННО до загрузки Unity.
      (function() {
        var p = new URLSearchParams(window.location.search);
        if (p.get('_tk')) return; // _tk уже есть — ничего не делаем

        // 1) MAX / Telegram: startapp / WebAppStartParam / tgWebAppStartParam
        var sp = p.get('startapp') || p.get('WebAppStartParam') || p.get('tgWebAppStartParam');
        if (sp) {
          p.set('_tk', sp);
          if (!p.get('_v')) p.set('_v', '2');
          history.replaceState(null, '', location.pathname + '?' + p.toString() + location.hash);
          return;
        }

        // 2) VK Mini App: open_app button passes params via "hash" launch param.
        //    VK sends: ...&hash=_tk%3Dabc123%26_v%3D2  (URL-encoded query string)
        //    Also check window.location.hash for direct link launches (#_tk=abc).
        var vkHash = p.get('hash') || window.location.hash.replace(/^#/, '');
        if (vkHash) {
          var hp = new URLSearchParams(vkHash);
          var tk = hp.get('_tk');
          if (tk) {
            p.set('_tk', tk);
            if (!p.get('_v')) p.set('_v', hp.get('_v') || '2');
            // Remove hash param itself — not needed by Unity
            p.delete('hash');
            history.replaceState(null, '', location.pathname + '?' + p.toString());
            console.log('[VK] Injected _tk from hash launch param:', tk);
            return;
          }
        }
      })();
    </script>
    <script>
      // VK Mini App — мгновенная инициализация, критично для мобильных клиентов.
      // VK требует VKWebAppInit в первые ~3 сек, иначе перенаправляет на VK ID.
      // На iPhone VK не инжектит bridge нативно — нужна СИНХРОННАЯ загрузка SDK.
      (function() {
        var inited = false;
        // Определяем, запущены ли мы внутри VK (по launch params в URL)
        var isVK = /[?&]vk_app_id=/.test(window.location.search);

        function doInit() {
          if (inited || !window.vkBridge) return false;
          inited = true;
          try {
            vkBridge.send('VKWebAppInit').then(function() {
              console.log('[VK] Init OK');
            }).catch(function(e) {
              console.warn('[VK] Init error:', e);
            });
          } catch(e) { console.warn('[VK] Init exception:', e); }
          return true;
        }

        // 1) Мобильный VK может инжектить vkBridge нативно — проверяем сразу
        if (doInit()) return;

        // 2) СИНХРОННАЯ загрузка SDK, если мы в VK (блокирует парсинг, но надёжно
        //    инициализирует bridge до таймаута VK — ~3 сек)
        if (isVK) {
          document.write('<scr' + 'ipt src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></scr' + 'ipt>');
        }

        // 3) Fallback: повторные попытки (после document.write script загрузится)
        var checks = [0, 50, 150, 400, 1000, 2000];
        checks.forEach(function(ms) { setTimeout(doInit, ms); });
      })();
    </script>
    <script>
      // MAX Mini App — инициализация через MAX Bridge.
      // MAX показывает ошибку "нет сети" если WebApp.ready() не вызван за 15 сек.
      (function() {
        var maxInited = false;
        function doMaxInit() {
          if (maxInited || !window.WebApp) return false;
          maxInited = true;
          try {
            WebApp.ready();
            console.log('[MAX] WebApp.ready() OK');
            // Inject _tk from start_param if not already in URL
            if (WebApp.initDataUnsafe && WebApp.initDataUnsafe.start_param) {
              var sp = WebApp.initDataUnsafe.start_param;
              if (sp && window.location.search.indexOf('_tk=') === -1) {
                var pp = new URLSearchParams(window.location.search);
                pp.set('_tk', sp);
                if (!pp.get('_v')) pp.set('_v', '2');
                history.replaceState(null, '', location.pathname + '?' + pp.toString());
                console.log('[MAX] Injected _tk from start_param:', sp);
              }
            }
          } catch(e) { console.warn('[MAX] ready() error:', e); }
          return true;
        }
        // 1) Проверяем сразу (MAX может инжектить WebApp нативно)
        if (doMaxInit()) return;
        // 2) Загружаем MAX Bridge SDK асинхронно
        var s = document.createElement('script');
        s.src = 'https://st.max.ru/js/max-web-app.js';
        s.async = true;
        s.onload = function() { doMaxInit(); };
        document.head.appendChild(s);
        // 3) Fallback-проверки
        [100, 500, 1500, 3000].forEach(function(ms) { setTimeout(doMaxInit, ms); });
      })();
    </script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Memory</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Build.data",
        frameworkUrl: buildUrl + "/Build.framework.js",
        codeUrl: buildUrl + "/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Game Solutions",
        productName: "Memory",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
